openapi: 3.0.3
info:
  title: LEED AI Platform API
  version: 1.0.0
  description: API for LEED v5 credit automation platform

servers:
  - url: https://api.leedai.io/v1
    description: Production
  - url: https://staging-api.leedai.io/v1
    description: Staging

security:
  - bearerAuth: []

paths:
  # Authentication
  /auth/login:
    post:
      summary: Login with email/password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        200:
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  # Dashboard
  /dashboard/stats:
    get:
      summary: Get dashboard statistics
      tags: [Dashboard]
      responses:
        200:
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'

  # Projects
  /projects:
    get:
      summary: List projects
      tags: [Projects]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        200:
          description: List of projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'

    post:
      summary: Create new project
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        201:
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{projectId}:
    get:
      summary: Get project details
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'

    patch:
      summary: Update project
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        200:
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{projectId}/credits:
    get:
      summary: Get project credits
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [not_started, in_progress, awaiting_review, approved, changes_requested, manual_required]
        - name: category
          in: query
          schema:
            type: string
      responses:
        200:
          description: List of credits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditList'

  /projects/{projectId}/team:
    get:
      summary: Get project team members
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Team members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberList'

    post:
      summary: Add team member
      tags: [Projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTeamMemberRequest'
      responses:
        201:
          description: Member added

  # Credits
  /credits:
    get:
      summary: List available credits
      tags: [Credits]
      parameters:
        - name: leed_version
          in: query
          schema:
            type: string
        - name: rating_system
          in: query
          schema:
            type: string
        - name: region
          in: query
          schema:
            type: string
      responses:
        200:
          description: List of credits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditDefinitionList'

  /credits/{creditCode}:
    get:
      summary: Get credit details
      tags: [Credits]
      parameters:
        - name: creditCode
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Credit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditDefinition'

  /credits/{creditCode}/upload:
    post:
      summary: Upload file for credit processing
      tags: [Credits]
      parameters:
        - name: creditCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                input_type:
                  type: string
      responses:
        200:
          description: File processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'

  /credits/{creditCode}/calculate:
    post:
      summary: Start credit calculation workflow
      tags: [Credits]
      parameters:
        - name: creditCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRequest'
      responses:
        202:
          description: Calculation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'

  /credits/{creditCode}/submit:
    post:
      summary: Submit generated credit package for HITL review
      description: V1 creates a human review task only. It does not submit documents to USGBC Arc or LEED Online.
      tags: [Credits]
      parameters:
        - name: creditCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitCreditRequest'
      responses:
        201:
          description: Submitted for review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HITLTask'

  # Workflows
  /workflows/{workflowId}:
    get:
      summary: Get workflow status
      tags: [Workflows]
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Workflow status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStatus'

  /workflows/{workflowId}/cancel:
    post:
      summary: Cancel workflow
      tags: [Workflows]
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Workflow cancelled

  # Reviews (HITL)
  /reviews:
    get:
      summary: List pending reviews
      tags: [Reviews]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, assigned, in_review, approved, rejected, changes_requested, escalated, expired]
        - name: project_id
          in: query
          schema:
            type: string
      responses:
        200:
          description: List of reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewList'

  /reviews/{reviewId}:
    get:
      summary: Get review details
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Review details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewDetail'

  /reviews/{reviewId}/approve:
    post:
      summary: Approve review
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveReviewRequest'
      responses:
        200:
          description: Review approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewActionResponse'

  /reviews/{reviewId}/reject:
    post:
      summary: Reject review
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectReviewRequest'
      responses:
        200:
          description: Review rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewActionResponse'

  /reviews/{reviewId}/request-changes:
    post:
      summary: Request changes and rewind workflow
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestChangesReviewRequest'
      responses:
        200:
          description: Changes requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewActionResponse'

  /reviews/{reviewId}/escalate:
    post:
      summary: Escalate review to another reviewer or role
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscalateReviewRequest'
      responses:
        200:
          description: Review escalated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewActionResponse'

  /reviews/{reviewId}/comments:
    post:
      summary: Add review comment
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddReviewCommentRequest'
      responses:
        201:
          description: Comment added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewComment'

  # Audit
  /audit/export:
    post:
      summary: Generate credit audit export package
      description: Creates a downloadable audit package containing evidence, calculations, source snapshots, HITL records, document manifests, and workflow trace.
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditExportRequest'
      responses:
        202:
          description: Audit export queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportResponse'

  # Users
  /users/me:
    get:
      summary: Get current user
      tags: [Users]
      responses:
        200:
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/me/projects:
    get:
      summary: Get user's projects
      tags: [Users]
      responses:
        200:
          description: User's projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        avatar_url:
          type: string
        role:
          type: string
        leed_ap_number:
          type: string

    DashboardStats:
      type: object
      properties:
        active_projects:
          type: integer
        credits_this_month:
          type: integer
        pending_reviews:
          type: integer
        points_achieved:
          type: integer

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        building_type:
          type: string
        leed_version:
          type: string
        rating_system:
          type: string
        target_level:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        created_at:
          type: string
          format: date-time

    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            credits_completed:
              type: integer
            credits_total:
              type: integer
            progress_percentage:
              type: number
            team:
              $ref: '#/components/schemas/TeamMemberList'

    ProjectList:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        total:
          type: integer

    CreateProjectRequest:
      type: object
      required: [name, building_type, leed_version, rating_system, target_level, location]
      properties:
        name:
          type: string
        code:
          type: string
        building_type:
          type: string
        leed_version:
          type: string
        rating_system:
          type: string
        target_level:
          type: string
        location:
          $ref: '#/components/schemas/Location'

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        target_level:
          type: string

    Location:
      type: object
      properties:
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string
        lat:
          type: number
        lng:
          type: number

    TeamMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        avatar_url:
          type: string
        leed_ap_number:
          type: string

    TeamMemberList:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'

    AddTeamMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
        role:
          type: string

    CreditDefinition:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        points:
          type: integer
        automation_level:
          type: integer
          description: Conservative realistic automation percentage, not a claim of hands-off compliance.
        category:
          type: string
        hitl_required:
          type: boolean
        hitl_checkpoints:
          type: array
          items:
            $ref: '#/components/schemas/HITLCheckpoint'
        required_inputs:
          type: array
          items:
            type: object
        expected_outputs:
          type: array
          items:
            type: string
        required_apis:
          type: array
          items:
            $ref: '#/components/schemas/APIDependency'
        skill_dependencies:
          type: array
          items:
            type: string
        regional_availability:
          $ref: '#/components/schemas/RegionalAvailabilityMap'

    CreditDefinitionList:
      type: object
      properties:
        credits:
          type: array
          items:
            $ref: '#/components/schemas/CreditDefinition'

    Credit:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        points:
          type: integer
        automation_level:
          type: integer
        status:
          type: string
          enum: [not_started, in_progress, awaiting_review, approved, changes_requested, manual_required]
        progress:
          type: number
        project_id:
          type: string
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
        regional_status:
          type: string
          enum: [available, limited, unavailable]

    CreditList:
      type: object
      properties:
        credits:
          type: array
          items:
            $ref: '#/components/schemas/Credit'

    FileUploadResponse:
      type: object
      properties:
        extracted_data:
          type: object
        confidence_scores:
          type: array
          items:
            $ref: '#/components/schemas/ConfidenceScore'
        validation_errors:
          type: array
          items:
            type: string
        evidence_items:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceItem'

    CalculateRequest:
      type: object
      properties:
        project_id:
          type: string
        inputs:
          type: object

    WorkflowResponse:
      type: object
      properties:
        workflow_id:
          type: string
        thread_id:
          type: string
        status:
          type: string

    WorkflowStatus:
      type: object
      properties:
        workflow_id:
          type: string
        thread_id:
          type: string
        status:
          type: string
          enum: [pending, running, paused, awaiting_review, completed, failed, cancelled, manual_required]
        progress:
          type: number
        current_step:
          type: string
        current_step_index:
          type: integer
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
        quality_gates:
          type: array
          items:
            $ref: '#/components/schemas/QualityGate'
        degraded_sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceDegradation'
        results:
          type: object
        error:
          type: string

    SubmitCreditRequest:
      type: object
      required: [project_id, workflow_id]
      properties:
        project_id:
          type: string
        workflow_id:
          type: string
        reviewer_id:
          type: string
        notes:
          type: string

    HITLTask:
      type: object
      properties:
        id:
          type: string
        workflow_id:
          type: string
        project_id:
          type: string
        credit_code:
          type: string
        checkpoint_name:
          type: string
        status:
          type: string
          enum: [pending, assigned, in_review, approved, rejected, changes_requested, escalated, expired]
        assignee_id:
          type: string
        assignee_role:
          type: string
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentArtifact'
        checklist:
          type: array
          items:
            type: object
        confidence_scores:
          type: array
          items:
            $ref: '#/components/schemas/ConfidenceScore'
        quality_gates:
          type: array
          items:
            $ref: '#/components/schemas/QualityGate'
        sla:
          $ref: '#/components/schemas/ReviewSLA'
        created_at:
          type: string

    Review:
      type: object
      properties:
        id:
          type: string
        credit_code:
          type: string
        credit_name:
          type: string
        project_name:
          type: string
        submitter_name:
          type: string
        submitted_at:
          type: string
        due_at:
          type: string
        status:
          type: string
          enum: [pending, assigned, in_review, approved, rejected, changes_requested, escalated, expired]
        confidence_score:
          type: number
          minimum: 0
          maximum: 1

    ReviewList:
      type: object
      properties:
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'

    ReviewDetail:
      type: object
      properties:
        id:
          type: string
        credit_code:
          type: string
        credit_name:
          type: string
        project_name:
          type: string
        submitter_name:
          type: string
        submitted_at:
          type: string
        due_at:
          type: string
        document_url:
          type: string
        excel_url:
          type: string
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentArtifact'
        checklist:
          type: array
          items:
            type: object
        confidence_scores:
          type: array
          items:
            $ref: '#/components/schemas/ConfidenceScore'
        quality_gates:
          type: array
          items:
            $ref: '#/components/schemas/QualityGate'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/ReviewComment'
        sla:
          $ref: '#/components/schemas/ReviewSLA'

    ApproveReviewRequest:
      type: object
      properties:
        checklist:
          type: array
          items:
            type: object
        comments:
          type: string
        document_hash:
          type: string
          description: Hash of the document version reviewed and approved.

    RejectReviewRequest:
      type: object
      required: [return_to_step, reason]
      properties:
        return_to_step:
          type: string
        reason:
          type: string
        specific_issues:
          type: array
          items:
            type: string
        document_hash:
          type: string

    RequestChangesReviewRequest:
      type: object
      required: [comments]
      properties:
        comments:
          type: string
        return_to_step:
          type: string
          description: Workflow node to resume from, such as calculate or fetch_api_data.
        checklist_feedback:
          type: object
        affected_fields:
          type: array
          items:
            type: string
        document_hash:
          type: string

    EscalateReviewRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
        target_reviewer_id:
          type: string
        target_role:
          type: string
        extend_sla_hours:
          type: integer

    AddReviewCommentRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
        reply_to:
          type: string
        attachments:
          type: array
          items:
            type: string

    ReviewActionResponse:
      type: object
      properties:
        review_id:
          type: string
        status:
          type: string
        workflow_id:
          type: string
        workflow_resumed:
          type: boolean
        workflow_rewound_to:
          type: string
        audit_event_id:
          type: string

    ReviewComment:
      type: object
      properties:
        id:
          type: string
        author_id:
          type: string
        author_role:
          type: string
        text:
          type: string
        timestamp:
          type: string
          format: date-time
        reply_to:
          type: string

    ReviewSLA:
      type: object
      properties:
        assigned_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        hours_total:
          type: integer
        hours_remaining:
          type: number
        escalation_level:
          type: integer

    HITLCheckpoint:
      type: object
      properties:
        name:
          type: string
        reviewer_role:
          type: string
        sla_hours:
          type: integer
        required:
          type: boolean
        instructions:
          type: string
        trigger:
          type: string

    APIDependency:
      type: object
      properties:
        api_name:
          type: string
        purpose:
          type: string
        regions:
          type: array
          items:
            type: string
        fallback_chain:
          type: array
          items:
            type: string
        data_freshness_hours:
          type: integer

    RegionalAvailabilityMap:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/RegionalAvailability'
      example:
        US:
          status: available
          notes: All required APIs available.
        EU:
          status: limited
          notes: Requires regional grid factors and manual source confirmation.

    RegionalAvailability:
      type: object
      properties:
        status:
          type: string
          enum: [available, limited, unavailable]
        required_manual_inputs:
          type: array
          items:
            type: string
        fallback_sources:
          type: array
          items:
            type: string
        notes:
          type: string

    ConfidenceScore:
      type: object
      properties:
        scope:
          type: string
          enum: [field, source, calculation, document_section, document, workflow]
        key:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1
        factors:
          type: object
        threshold:
          type: number
        requires_human_review:
          type: boolean

    QualityGate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [pass, warn, fail, blocked]
        severity:
          type: string
          enum: [low, medium, high, critical]
        message:
          type: string
        evidence_ids:
          type: array
          items:
            type: string

    EvidenceItem:
      type: object
      properties:
        id:
          type: string
        source_id:
          type: string
        locator:
          type: string
        extracted_value:
          type: object
        confidence_score:
          type: number
        checksum:
          type: string

    SourceDegradation:
      type: object
      properties:
        api_name:
          type: string
        degradation_type:
          type: string
          enum: [cached, stale, static_fallback, manual_required, unavailable]
        source_id:
          type: string
        message:
          type: string

    DocumentArtifact:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        format:
          type: string
        url:
          type: string
        checksum:
          type: string
        template_version:
          type: string
        evidence_ids:
          type: array
          items:
            type: string

    AuditExportRequest:
      type: object
      required: [project_id]
      properties:
        project_id:
          type: string
        credit_code:
          type: string
        workflow_id:
          type: string
        include_raw_api_responses:
          type: boolean
          default: false
        redaction_level:
          type: string
