id: leed.we_p2.water_min
credit_code: WEp2
credit_name: Minimum Water Efficiency
leed_version: v5
category: WE
is_prerequisite: true
max_points: 0
version: 1.0.0

automation_level: mostly_automated
complexity: low
requires_human_review: true

inputs:
  - name: fixture_schedule
    type: file_or_table
    source: consultant_upload
    required: true
    description: Fixture schedule with type, manufacturer, model, quantity, and flow rate
  - name: project_occupancy
    type: object
    source: consultant_input
    required: true
    description: FTE, transient, and resident occupant counts
  - name: building_type
    type: enum
    source: consultant_input
    required: true
    description: "One of: office, retail, residential, healthcare, education, hospitality, warehouse, other"
  - name: gender_ratio
    type: float
    source: consultant_input
    required: true
    description: Male proportion (0.0–1.0) for toilet/urinal split

outputs:
  - name: water_efficiency_report_pdf
    type: file
    format: pdf
    description: Calculation narrative with methodology and results
  - name: calculation_workbook_xlsx
    type: file
    format: xlsx
    description: Fixture compliance table and water use calculations
  - name: source_index_json
    type: json
    description: Source index linking all values to origin data

workflow_steps:
  - order: 1
    name: validate_inputs
    step_type: validation
    automated: true
    description: Parse fixture schedule, validate occupancy counts and building type
    timeout_seconds: 30
    on_failure: abort

  - order: 2
    name: fetch_watersense_certification
    step_type: api_call
    automated: true
    description: Query EPA WaterSense for each fixture
    retry_policy:
      max_retries: 3
      backoff: exponential
    timeout_seconds: 120
    on_failure: continue

  - order: 3
    name: fetch_energy_star_data
    step_type: api_call
    automated: true
    description: Query ENERGY STAR for eligible appliances
    retry_policy:
      max_retries: 3
      backoff: exponential
    timeout_seconds: 120
    on_failure: continue

  - order: 4
    name: calculate_baseline
    step_type: calculation
    automated: true
    description: Compute baseline water use using LEED v5 default flow rates
    timeout_seconds: 30
    on_failure: abort

  - order: 5
    name: calculate_design
    step_type: calculation
    automated: true
    description: Compute design water use using project fixture flow rates
    timeout_seconds: 30
    on_failure: abort

  - order: 6
    name: compute_reduction
    step_type: calculation
    automated: true
    description: Calculate reduction percentage, verify >= 20% threshold
    timeout_seconds: 30
    on_failure: abort

  - order: 7
    name: hitl_review
    step_type: hitl_review
    automated: false
    description: Consultant verifies fixture schedule, occupancy, and calculations
    timeout_seconds: 86400
    on_failure: abort

  - order: 8
    name: generate_documents
    step_type: document_generation
    automated: true
    description: Generate compliance XLSX and calculation narrative PDF
    retry_policy:
      max_retries: 2
      backoff: exponential
    timeout_seconds: 120
    on_failure: abort

  - order: 9
    name: finalize_package
    step_type: validation
    automated: true
    description: Assemble evidence package with checksums
    timeout_seconds: 30
    on_failure: abort

agents:
  - name: evidence_extraction_agent
    role: evidence_extraction

validators:
  - name: fixture_schedule_complete
    description: All fixtures must have type, flow_rate, and quantity
    required: true
  - name: occupancy_positive
    description: At least one occupancy category must be positive
    required: true
  - name: reduction_threshold
    description: Water reduction must be >= 20%
    required: true

regional_availability:
  - region: global
    automation_level: mostly_automated
    available_apis:
      - watersense
      - energy_star
    fallback_strategy: manual_entry

required_apis:
  - watersense
  - energy_star

skill_dependencies: []
