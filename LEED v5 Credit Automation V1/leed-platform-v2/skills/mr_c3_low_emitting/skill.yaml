id: leed.mr_c3.low_emitting_materials
credit_code: MRc3
credit_name: Low-Emitting Materials
leed_version: v5
category: MR
is_prerequisite: false
max_points: 3
version: 1.0.0

automation_level: mostly_automated
complexity: medium
requires_human_review: true

inputs:
  - name: product_datasheets
    type: file[]
    source: consultant_upload
    required: true
    description: Product datasheets, spec sheets, and technical data for all interior materials
  - name: voc_certificates
    type: file[]
    source: consultant_upload
    required: true
    description: VOC emission test reports and certification documents (GREENGUARD, FloorScore, etc.)
  - name: material_schedule
    type: file
    source: consultant_upload
    required: true
    description: Master material schedule listing all interior products by space
  - name: floor_area_by_space_type
    type: object
    source: consultant_input
    required: true
    description: Floor area breakdown by space type (regularly occupied, non-regularly occupied)
  - name: product_category_mapping
    type: object
    source: auto_or_manual
    required: false
    description: Mapping of products to LEED material categories (adhesives, sealants, paints, flooring, etc.)

outputs:
  - name: compliance_table_xlsx
    type: file
    format: xlsx
    description: Product compliance table with VOC/certification status per product
  - name: reviewer_narrative_pdf
    type: file
    format: pdf
    description: Credit narrative for LEED reviewer
  - name: missing_evidence_report
    type: json
    description: List of products missing VOC certificates or test reports
  - name: evidence_manifest_json
    type: json
    description: Full evidence manifest with checksums and source citations

workflow_steps:
  - order: 1
    name: validate_inputs
    step_type: validation
    automated: true
    description: Validate uploaded files, check material schedule format, verify floor areas
    retry_policy:
      max_retries: 1
      backoff: none
    timeout_seconds: 30
    on_failure: abort

  - order: 2
    name: extract_product_evidence
    step_type: agent_extraction
    automated: true
    description: Agent reads product datasheets and VOC certificates, extracts structured product data with source citations
    retry_policy:
      max_retries: 2
      backoff: exponential
    timeout_seconds: 300
    on_failure: escalate

  - order: 3
    name: match_certifications
    step_type: agent_extraction
    automated: true
    description: Match extracted products against GREENGUARD, FloorScore, SCS, and other certification databases
    retry_policy:
      max_retries: 3
      backoff: exponential
    timeout_seconds: 120
    on_failure: continue

  - order: 4
    name: categorize_products
    step_type: calculation
    automated: true
    description: Map products to LEED material categories (adhesives & sealants, paints & coatings, flooring, composite wood, ceiling & wall systems)
    retry_policy:
      max_retries: 1
      backoff: none
    timeout_seconds: 30
    on_failure: abort

  - order: 5
    name: calculate_compliance
    step_type: calculation
    automated: true
    description: Calculate compliance percentage by category, determine point achievement (1-3 points based on thresholds)
    retry_policy:
      max_retries: 1
      backoff: none
    timeout_seconds: 30
    on_failure: abort

  - order: 6
    name: hitl_review
    step_type: hitl_review
    automated: false
    description: Consultant reviews product extraction, certification matches, and compliance calculations
    timeout_seconds: 86400
    on_failure: abort

  - order: 7
    name: generate_documents
    step_type: document_generation
    automated: true
    description: Generate compliance table XLSX, reviewer narrative PDF, and evidence manifest
    retry_policy:
      max_retries: 2
      backoff: exponential
    timeout_seconds: 120
    on_failure: abort

  - order: 8
    name: finalize_package
    step_type: validation
    automated: true
    description: Assemble final evidence package with checksums and source index
    timeout_seconds: 30
    on_failure: abort

agents:
  - name: evidence_extraction_agent
    role: evidence_extraction
  - name: certification_matching_agent
    role: certification_matching
  - name: narrative_generation_agent
    role: narrative_generation

validators:
  - name: source_citation_required
    description: Every extracted product must have source_file and source_page
    required: true
  - name: certification_expiry_check
    description: Warn if any certification expires before project submission date
    required: false
  - name: product_category_mapping_check
    description: All products must map to a valid LEED material category
    required: true
  - name: voc_threshold_check
    description: VOC content must be below LEED threshold for each product category
    required: true

regional_availability:
  - region: US
    automation_level: mostly_automated
    available_apis:
      - greenguard
      - floorscore
      - scs_global
    fallback_strategy: manual_entry
  - region: global
    automation_level: assisted
    available_apis:
      - greenguard
    fallback_strategy: manual_entry

required_apis:
  - greenguard
  - floorscore
  - scs_global

skill_dependencies: []

instructions_file: instructions.md
input_schema_file: input_schema.json
output_schema_file: output_schema.json
templates_dir: templates
scripts_dir: scripts
