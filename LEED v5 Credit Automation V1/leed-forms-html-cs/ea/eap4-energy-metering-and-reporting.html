        <script>
            // Function to dynamically add GTM script
            function loadGTM(id) {
                // Load the external GTM script
                let script = document.createElement('script');
                script.async = true;
                script.src = `https://www.googletagmanager.com/gtag/js?id=${id}`;
                document.head.appendChild(script);

                // Configure gtag after the script is loaded
                script.onload = function() {
                    window.dataLayer = window.dataLayer || [];
                    function gtag() { dataLayer.push(arguments); }
                    gtag('js', new Date());
                    gtag('config', id);
                };
            }

            function loadGoogleMapsApi(key) {
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places&v=weekly`;
                script.async = true;
                script.defer = true;
                document.head.appendChild(script);
            }

            function loadBablic() {
                const script = document.createElement('script');
                script.src = '//d.bablic.com/snippet/6852bca98e776d8c367da2f3.js';
                script.defer = true;
                document.head.appendChild(script);
            }

            function loadAccessibilityWidget(key) {
                const script = document.createElement('script');
                script.src = `https://www.skynettechnologies.com/accessibility/js/all-in-one-accessibility-js-widget-minify.js?colorcode=%23420083&token=${key}&position=bottom_right`;
                script.id = "aioa-adawidget";
                script.defer = true;
                document.body.appendChild(script);
            }

            document.addEventListener('DOMContentLoaded', function () {
                const gtmId = window.env.GOOGLE_TAG_MANAGER_ID;
                const gmapsAPiKey = window.env.GOOGLE_MAPS_API_KEY;
                const skyNetKey = window.env.SKYNET_ACCEBILITY_WIDGET_KEY;

                loadGTM(gtmId);
                loadGoogleMapsApi(gmapsAPiKey);
                loadAccessibilityWidget(skyNetKey);

                if (window.env.ENV === 'dev') { // For now, only load in dev
                    loadBablic();
                }
            });
        </script>
